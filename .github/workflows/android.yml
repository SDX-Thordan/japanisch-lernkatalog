name: Build APK

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  # Gate: Tests müssen grün sein, bevor die APK gebaut wird.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Unit-Tests (Vitest)
        run: npm test
      - name: Playwright-Browser
        run: npx playwright install --with-deps chromium
      - name: E2E-Smokes (Playwright)
        run: npm run e2e

  build:
    needs: test
    # APK NUR bei Release (oder manuell) bauen — nicht bei jedem Push/PR.
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # für das Hochladen der APK ans GitHub-Release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Android SDK
        uses: android-actions/setup-android@v3

      - run: npm ci

      - name: Version bestimmen (Release-Tag ist maßgeblich) & in package.json schreiben
        id: ver
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"            # vX.Y.Z → X.Y.Z (Tag = Quelle der Wahrheit)
          else
            PKG_VERSION=$(node -p "require('./package.json').version")
            VERSION_NAME="${PKG_VERSION}-dev.${GITHUB_RUN_NUMBER}"
          fi
          # In package.json schreiben, damit build:www → assets/version.js (Footer) dieselbe Version zeigt.
          node -e "const f='package.json',p=require('./'+f);p.version='${VERSION_NAME}';require('fs').writeFileSync(f,JSON.stringify(p,null,2)+'\n')"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION_NAME (versionCode ${GITHUB_RUN_NUMBER})"

      - name: Web-Assets nach www/ stagen
        run: npm run build:www

      - name: OTA-Bundle + Manifest erzeugen (@capgo Live-Update, konstante Asset-Namen)
        run: |
          set -eo pipefail
          # Web-Bundle (Inhalt von www/ auf Zip-Wurzel) — wird vom Updater nachgeladen & entpackt.
          ( cd www && zip -qr ../www-bundle.zip . )
          # Manifest mit der Version; konstante Namen → …/releases/latest/download/<asset> zeigt stets auf neu.
          node -e "require('fs').writeFileSync('ota-manifest.json', JSON.stringify({version:'${{ steps.ver.outputs.version_name }}'})+'\n')"
          ls -la www-bundle.zip ota-manifest.json

      - name: Android-Projekt erzeugen (Capacitor)
        run: npx cap add android

      - name: compileSdk auf 35 anheben (@capgo zieht androidx.work:work-runtime ≥ 2.10, das compileSdk 35 verlangt)
        run: |
          set -eo pipefail
          # Capacitor 6 setzt compileSdkVersion = 34; androidx.work 2.10.x verlangt aber 35 (AAR-Metadaten-Check).
          sed -i -E "s/compileSdkVersion *= *[0-9]+/compileSdkVersion = 35/" android/variables.gradle
          grep -E "compileSdkVersion|targetSdkVersion" android/variables.gradle
          grep -q "compileSdkVersion = 35" android/variables.gradle || { echo "::error::compileSdkVersion-Patch fehlgeschlagen"; exit 1; }

      - name: App-Icon & Splash aus resources/ erzeugen (@capacitor/assets)
        run: |
          set -eo pipefail
          # Quell-Bilder müssen vorhanden sein — sonst erzeugt @capacitor/assets stillschweigend nichts.
          for f in icon-only icon-foreground icon-background; do
            test -f "resources/$f.png" || { echo "::error::resources/$f.png fehlt — Launcher-Icon kann nicht erzeugt werden"; exit 1; }
          done
          # WICHTIG: --assetPath resources. Ohne das sucht das Tool im Default-Ordner „assets" (= unser
          # Web-Verzeichnis) und macht nichts → die APK behält das Capacitor-Standard-Icon.
          npx @capacitor/assets generate --android --assetPath resources | tee /tmp/assets-gen.log
          # Absichern: es muss tatsächlich generiert worden sein (kein stiller No-Op mehr).
          grep -qiE "generated" /tmp/assets-gen.log || { echo "::error::@capacitor/assets hat keine Icons erzeugt"; exit 1; }
          test -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml

      - name: Synchronisieren
        run: npx cap sync android

      - name: Version in build.gradle setzen (versionCode hochzählend → Update ohne Neuinstallation)
        run: |
          sed -i -E "s/versionCode [0-9]+/versionCode ${GITHUB_RUN_NUMBER}/" android/app/build.gradle
          sed -i -E "s/versionName \"[^\"]*\"/versionName \"${{ steps.ver.outputs.version_name }}\"/" android/app/build.gradle
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Signierte Release-APK bauen
        run: |
          cd android && chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/signing/go-nihongo.keystore" \
            -Pandroid.injected.signing.store.password=gonihongo \
            -Pandroid.injected.signing.key.alias=gonihongo \
            -Pandroid.injected.signing.key.password=gonihongo

      - name: Signatur prüfen (apksigner, optional)
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          BT=$(ls -d "$ANDROID_HOME"/build-tools/* | sort | tail -1)
          "$BT/apksigner" verify --print-certs "$APK" | head -3 || true

      - name: APK versioniert benennen
        id: apk
        run: |
          SRC=android/app/build/outputs/apk/release/app-release.apk
          DEST="go-nihongo-${{ steps.ver.outputs.version_name }}.apk"
          cp "$SRC" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Release-APK als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: go-nihongo-release-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: APK + OTA-Bundle ans GitHub-Release hängen (nur bei Release)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            ${{ steps.apk.outputs.path }}
            www-bundle.zip
            ota-manifest.json
