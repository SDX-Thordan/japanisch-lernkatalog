name: Build APK

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Gate: Tests müssen grün sein, bevor die APK gebaut wird.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Unit-Tests (Vitest)
        run: npm test
      - name: Playwright-Browser
        run: npx playwright install --with-deps chromium
      - name: E2E-Smokes (Playwright)
        run: npm run e2e

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Android SDK
        uses: android-actions/setup-android@v3

      - run: npm ci

      - name: Web-Assets nach www/ stagen
        run: npm run build:www

      - name: Android-Projekt erzeugen (Capacitor)
        run: npx cap add android

      - name: App-Icon & Splash aus resources/ erzeugen (@capacitor/assets)
        run: npx @capacitor/assets generate --android

      - name: Synchronisieren
        run: npx cap sync android

      - name: Version setzen (hochzählend → Update ohne Neuinstallation)
        run: |
          sed -i -E "s/versionCode [0-9]+/versionCode ${GITHUB_RUN_NUMBER}/" android/app/build.gradle
          sed -i -E "s/versionName \"[^\"]*\"/versionName \"1.${GITHUB_RUN_NUMBER}\"/" android/app/build.gradle
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Signierte Release-APK bauen
        run: |
          cd android && chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/signing/go-nihongo.keystore" \
            -Pandroid.injected.signing.store.password=gonihongo \
            -Pandroid.injected.signing.key.alias=gonihongo \
            -Pandroid.injected.signing.key.password=gonihongo

      - name: Signatur prüfen (apksigner, optional)
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          BT=$(ls -d "$ANDROID_HOME"/build-tools/* | sort | tail -1)
          "$BT/apksigner" verify --print-certs "$APK" | head -3 || true

      - name: Release-APK als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: go-nihongo-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
